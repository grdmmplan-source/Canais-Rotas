name: Debug Canais Por Rota

on:
  workflow_dispatch:
    inputs:
      target_route:
        description: 'Rota alvo (a que vamos editar)'
        required: true
        type: string
        default: 'R1'
      source_route:
        description: 'Rota de origem (de onde viriam os canais)'
        required: true
        type: string
        default: 'NEWVOICE'

jobs:
  debug-channels:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install playwright

      - name: Instalar navegador Chromium
        run: npx playwright install --with-deps chromium

      - name: Executar investigacao
        env:
          OLOS_USER: ${{ secrets.OLOS_USER }}
          OLOS_PASS: ${{ secrets.OLOS_PASS }}
          TARGET_ROUTE_NAME: ${{ inputs.target_route }}
          SOURCE_ROUTE_NAME: ${{ inputs.source_route }}
        run: node debug-channels.js
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: debug-artifacts, path: debug-*.png, if-no-files-found: ignore }
